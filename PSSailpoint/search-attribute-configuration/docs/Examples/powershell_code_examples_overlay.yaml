- path: /accounts/v1/search-attribute-config/{name}
  method: PATCH
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/searchattributeconfigurationv1/methods/search-attribute-configuration#patch-search-attribute-config-v1
      source: |
        $Name = "promotedMailAttribute" # String | Name of the search attribute configuration to patch.
        $XSailPointExperimental = "true" # String | Use this header to enable this experimental API. (default to "true")
        $JsonpatchoperationValue = Initialize-JsonpatchoperationValue 
$Jsonpatchoperation = Initialize-Jsonpatchoperation -Op "add" -Path "/description" -Value $JsonpatchoperationValue# Jsonpatchoperation[] | 
        $Jsonpatchoperation = @"[{"op":"replace","path":"/name","value":"newAttributeName"},{"op":"replace","path":"/displayName","value":"new attribute display name"},{"op":"add","path":"/applicationAttributes","value":{"2c91808b79fd2422017a0b35d30f3968":"employeeNumber"}}]"@ 
        
        
        # Update extended search attribute
        
        try {
            $Result = ConvertFrom-JsonToJsonpatchoperation -Json $Jsonpatchoperation
            Update-SearchAttributeConfigV1 -Name $Name -XSailPointExperimental $XSailPointExperimental -Jsonpatchoperation $Result 
    
            # Below is a request that includes all optional parameters
            # Update-SearchAttributeConfigV1 -Name $Name -XSailPointExperimental $XSailPointExperimental -Jsonpatchoperation $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Update-SearchAttributeConfigV1"
            Write-Host $_.ErrorDetails
        }
