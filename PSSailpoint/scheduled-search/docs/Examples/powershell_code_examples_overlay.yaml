- path: /scheduled-searches/v1
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/scheduledsearch/methods/scheduled-search#create-scheduled-search-v1
      source: |
        $CreateScheduledSearchV1Request = @"
        {"savedSearchId":"9c620e13-cd33-4804-a13d-403bd7bcdbad","schedule":{"type":"DAILY","hours":{"type":"LIST","values":["9"]}},"recipients":[{"type":"IDENTITY","id":"2c9180867624cbd7017642d8c8c81f67"}]}
        "@
        
        # Create a new scheduled search
        
        try {
            $Result = ConvertFrom-JsonToCreateScheduledSearchV1Request -Json $CreateScheduledSearchV1Request
            New-ScheduledSearchV1 -CreateScheduledSearchV1Request $Result 
    
            # Below is a request that includes all optional parameters
            # New-ScheduledSearchV1 -CreateScheduledSearchV1Request $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling New-ScheduledSearchV1"
            Write-Host $_.ErrorDetails
        }
