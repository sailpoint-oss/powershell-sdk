      label: SDK_tools/sdk/powershell/passwordmanagement/methods/password-management#get-password-change-status-v1
      source: |
        $Id = "089899f13a8f4da7824996191587bab9" # String | Password change request ID
        
        # Get password change request status
        
        try {
