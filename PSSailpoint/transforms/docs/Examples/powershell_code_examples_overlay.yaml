- path: /transforms/v1
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/transforms/methods/transforms#create-transform-v1
      source: |
        $Transform = @"
        {"name":"Timestamp To Date","type":"dateFormat","attributes":{"inputFormat":"MMM dd yyyy, HH:mm:ss.SSS","outputFormat":"yyyy/dd/MM"}}
        "@
        
        # Create transform
        
        try {
            $Result = ConvertFrom-JsonToTransform -Json $Transform
            New-TransformV1 -Transform $Result 
    
            # Below is a request that includes all optional parameters
            # New-TransformV1 -Transform $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling New-TransformV1"
            Write-Host $_.ErrorDetails
        }
