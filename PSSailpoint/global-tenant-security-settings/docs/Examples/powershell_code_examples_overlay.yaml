- path: /auth-org/v1/lockout-config
  method: PATCH
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/globaltenantsecuritysettingsv1/methods/global-tenant-security-settings#patch-auth-org-lockout-config-v1
      source: |
        $JsonpatchoperationValue = Initialize-JsonpatchoperationValue 
$Jsonpatchoperation = Initialize-Jsonpatchoperation -Op "add" -Path "/description" -Value $JsonpatchoperationValue# Jsonpatchoperation[] | A list of auth org lockout configuration update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard. Ensures that the patched Lockout Config conforms to certain logical guidelines, which are:   `1. maximumAttempts >= 1 && maximumAttempts <= 15   2. lockoutDuration >= 5 && lockoutDuration <= 60   3. lockoutWindow >= 5 && lockoutDuration <= 60`
        $Jsonpatchoperation = @"[{"op":"replace","path":"/maximumAttempts","value":"7,"},{"op":"add","path":"/lockoutDuration","value":35}]"@ 
        
        
        # Update auth org lockout configuration
        
        try {
            $Result = ConvertFrom-JsonToJsonpatchoperation -Json $Jsonpatchoperation
            Update-AuthOrgLockoutConfigV1 -Jsonpatchoperation $Result 
    
            # Below is a request that includes all optional parameters
            # Update-AuthOrgLockoutConfigV1 -Jsonpatchoperation $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Update-AuthOrgLockoutConfigV1"
            Write-Host $_.ErrorDetails
        }
