- path: /task-status/v1/{id}
  method: GET
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/taskmanagement/methods/task-management#get-task-status-v1
      source: |
        $Id = "00eebcf881994e419d72e757fd30dc0e" # String | Task ID.
        
        # Get task status by id
        
        try {
            Get-TaskStatusV1 -Id $Id 
    
