- path: /workflows/v1/{id}
  method: PUT
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/workflows/methods/workflows#put-workflow-v1
      source: |
        $Id = "c17bea3a-574d-453c-9e04-4365fbf5af0b" # String | Id of the Workflow
        $WorkflowBody = @"
        {
          "owner" : {
            "name" : "William Wilson",
            "id" : "2c91808568c529c60168cca6f90c1313",
            "type" : "IDENTITY"
          },
          "name" : "Send Email",
          "description" : "Send an email to the identity who's attributes changed.",
          "definition" : {
            "start" : "Send Email Test",
            "steps" : {
              "Send Email" : {
                "actionId" : "sp:send-email",
                "attributes" : {
                  "body" : "This is a test",
                  "from" : "sailpoint@sailpoint.com",
                  "recipientId.$" : "$.identity.id",
                  "subject" : "test"
                },
                "nextStep" : "success",
                "selectResult" : null,
                "type" : "ACTION"
              },
              "success" : {
                "type" : "success"
              }
            }
          },
          "trigger" : {
            "displayName" : "displayName",
            "attributes" : {
              "description" : "Triggered when an identity's manager attribute changes",
              "formDefinitionId" : "Admin_Access_Request_Form",
              "attributeToFilter" : "LifecycleState",
              "id" : "idn:identity-attributes-changed",
              "filter.$" : "$.changes[?(@.attribute == 'manager')]"
            },
            "type" : "EVENT"
          },
          "enabled" : false
        }
        "@
        
        # Update workflow
        
        try {
            $Result = ConvertFrom-JsonToWorkflowBody -Json $WorkflowBody
            Send-WorkflowV1 -Id $Id -WorkflowBody $Result 
    
            # Below is a request that includes all optional parameters
            # Send-WorkflowV1 -Id $Id -WorkflowBody $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Send-WorkflowV1"
            Write-Host $_.ErrorDetails
        }
