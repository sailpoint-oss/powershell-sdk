- path: /authorization/v1/custom-user-levels
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/customuserlevels/methods/custom-user-levels#create-custom-user-level-v1
      source: |
        $XSailPointExperimental = "true" # String | Use this header to enable this experimental API. (default to "true")
        $Userlevelrequest = @"
        {"name":"Identity And Access Management","description":"This is a description of the custom user level.","owner":{"id":"29b9da8273b441239238bc041c386817","name":"John Doe"},"rightSets":["idn:ui-identity-manage-example","idn:ui-identity-manage-child-one-example"]}
        "@
        
        # Create a custom user level
        
        try {
            $Result = ConvertFrom-JsonToUserlevelrequest -Json $Userlevelrequest
            New-CustomUserLevelV1 -XSailPointExperimental $XSailPointExperimental -Userlevelrequest $Result 
    
            # Below is a request that includes all optional parameters
            # New-CustomUserLevelV1 -XSailPointExperimental $XSailPointExperimental -Userlevelrequest $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling New-CustomUserLevelV1"
            Write-Host $_.ErrorDetails
        }
