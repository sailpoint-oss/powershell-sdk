- path: /sim-integrations/v1/{id}/beforeProvisioningRule
  method: PATCH
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/simintegrations/methods/sim-integrations#patch-before-provisioning-rule-v1
      source: |
        $Id = "12345" # String | SIM integration id
        $XSailPointExperimental = "true" # String | Use this header to enable this experimental API. (default to "true")
        $JsonPatch = @"
        {
          "operations" : [ {
            "op" : "replace",
            "path" : "/description",
            "value" : "New description"
          }, {
            "op" : "replace",
            "path" : "/description",
            "value" : "New description"
          } ]
        }
        "@
        
        # Patch a sim beforeprovisioningrule attribute.
        
        try {
            $Result = ConvertFrom-JsonToJsonPatch -Json $JsonPatch
            Update-BeforeProvisioningRuleV1 -Id $Id -XSailPointExperimental $XSailPointExperimental -JsonPatch $Result 
    
            # Below is a request that includes all optional parameters
            # Update-BeforeProvisioningRuleV1 -Id $Id -XSailPointExperimental $XSailPointExperimental -JsonPatch $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Update-BeforeProvisioningRuleV1"
            Write-Host $_.ErrorDetails
        }
