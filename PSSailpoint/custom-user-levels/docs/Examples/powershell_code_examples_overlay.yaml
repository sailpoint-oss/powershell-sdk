        # Update a user level
        
        try {
            $Result = ConvertFrom-JsonToJsonpatch -Json $Jsonpatch
            Update-UserLevelV1 -XSailPointExperimental $XSailPointExperimental -Id $Id -Jsonpatch $Result 
    
