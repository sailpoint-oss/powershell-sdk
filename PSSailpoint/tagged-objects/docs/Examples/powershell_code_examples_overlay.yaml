- path: /tagged-objects/v1/{type}/{id}
  method: PUT
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/taggedobjects/methods/tagged-objects#put-tagged-object-v1
      source: |
        $Type = "ACCESS_PROFILE" # String | The type of tagged object to update.
        $Id = "ef38f94347e94562b5bb8424a56397d8" # String | The ID of the object reference to update.
        $TaggedObject = @"
        {
          "objectRef" : {
            "name" : "William Wilson",
            "id" : "2c91808568c529c60168cca6f90c1313",
            "type" : "IDENTITY"
          },
          "tags" : [ "BU_FINANCE", "PCI" ]
        }
        "@
        
        # Update tagged object
        
        try {
            $Result = ConvertFrom-JsonToTaggedObject -Json $TaggedObject
