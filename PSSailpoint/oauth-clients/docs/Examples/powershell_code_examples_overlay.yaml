- path: /oauth-clients/v1/{id}
  method: PATCH
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/oauthclients/methods/o-auth-clients#patch-oauth-client-v1
      source: |
        $Id = "ef38f94347e94562b5bb8424a56397d8" # String | The OAuth client id
        $JsonPatchOperation = @"{
          "op" : "replace",
          "path" : "/description",
          "value" : "New description"
        }"@ 
        
        
        # Patch oauth client
        
        try {
            $Result = ConvertFrom-JsonToJsonPatchOperation -Json $JsonPatchOperation
            Update-OauthClientV1 -Id $Id -JsonPatchOperation $Result 
    
            # Below is a request that includes all optional parameters
            # Update-OauthClientV1 -Id $Id -JsonPatchOperation $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Update-OauthClientV1"
            Write-Host $_.ErrorDetails
        }
