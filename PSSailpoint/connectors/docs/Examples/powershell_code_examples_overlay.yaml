  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/connectorsv1/methods/connectors#create-custom-connector-v1
      source: |
        $V3createconnectordto = @"
        
        "@
        
        # Create custom connector
        
        try {
            $Result = ConvertFrom-JsonToV3createconnectordto -Json $V3createconnectordto
            New-CustomConnectorV1 -V3createconnectordto $Result 
    
            # Below is a request that includes all optional parameters
