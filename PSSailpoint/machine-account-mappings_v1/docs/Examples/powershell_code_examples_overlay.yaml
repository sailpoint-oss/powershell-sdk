- path: /sources/v1/{sourceId}/machine-account-mappings
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/machineaccountmappingsv1/methods/machine-account-mappings#create-machine-account-mappings-v1
      source: |
        $SourceId = "ef38f94347e94562b5bb8424a56397d8" # String | Source ID.
        $Attributemappings = @"
        
        "@
        
        # Create machine account mappings
        
        try {
            $Result = ConvertFrom-JsonToAttributemappings -Json $Attributemappings
            New-MachineAccountMappingsV1 -SourceId $SourceId -Attributemappings $Result 
    
            # Below is a request that includes all optional parameters
            # New-MachineAccountMappingsV1 -SourceId $SourceId -Attributemappings $Result   
        } catch {
