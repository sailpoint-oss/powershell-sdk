- path: /workgroups/v1
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/governancegroups/methods/governance-groups#create-workgroup-v1
      source: |
        $WorkgroupDto = @"
        {
          "owner" : {
            "emailAddress" : "support@sailpoint.com",
            "displayName" : "Support",
            "name" : "Support",
            "id" : "2c9180a46faadee4016fb4e018c20639",
            "type" : "IDENTITY"
          },
          "connectionCount" : 1641498673000,
          "created" : "2022-01-06T19:51:13Z",
          "memberCount" : 1641498673000,
          "name" : "DB Access Governance Group",
          "description" : "Description of the Governance Group",
          "modified" : "2022-01-06T19:51:13Z",
          "id" : "2c91808568c529c60168cca6f90c1313"
        }
        "@
        
        # Create a new governance group.
        
        try {
            $Result = ConvertFrom-JsonToWorkgroupDto -Json $WorkgroupDto
            New-WorkgroupV1 -WorkgroupDto $Result 
    
            # Below is a request that includes all optional parameters
            # New-WorkgroupV1 -WorkgroupDto $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling New-WorkgroupV1"
            Write-Host $_.ErrorDetails
        }
