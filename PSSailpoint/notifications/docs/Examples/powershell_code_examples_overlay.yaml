      source: |
        $TemplateDto = @"
        {
          "slackTemplate" : {
            "isSubscription" : false,
            "attachments" : "[]",
            "blocks" : "blocks",
            "requestId" : "requestId",
            "autoApprovalData" : {
              "itemId" : "itemId",
              "itemType" : "itemType",
              "autoApprovalMessageJSON" : "autoApprovalMessageJSON",
              "isAutoApproved" : "isAutoApproved",
              "autoApprovalTitle" : "autoApprovalTitle"
            },
            "customFields" : {
              "requestType" : "requestType",
              "campaignId" : "campaignId",
              "campaignStatus" : "campaignStatus",
              "containsDeny" : "containsDeny"
            },
            "requestedById" : "requestedById",
            "approvalId" : "approvalId",
            "text" : "You have a new approval request",
            "notificationType" : "notificationType",
            "key" : "key"
          },
          "footer" : "footer",
          "teamsTemplate" : {
            "isSubscription" : false,
            "requestId" : "requestId",
            "autoApprovalData" : {
              "itemId" : "itemId",
              "itemType" : "itemType",
              "autoApprovalMessageJSON" : "autoApprovalMessageJSON",
              "isAutoApproved" : "isAutoApproved",
              "autoApprovalTitle" : "autoApprovalTitle"
            },
            "customFields" : {
              "requestType" : "requestType",
              "campaignId" : "campaignId",
              "campaignStatus" : "campaignStatus",
              "containsDeny" : "containsDeny"
            },
            "requestedById" : "requestedById",
            "approvalId" : "approvalId",
            "text" : "You have a new approval request",
            "notificationType" : "notificationType",
            "title" : "title",
            "key" : "key",
            "messageJSON" : "messageJSON"
          },
          "subject" : "You have $numberOfPendingTasks $taskTasks to complete in ${__global.productName}.",
          "created" : "2020-01-01T00:00:00Z",
          "description" : "Daily digest - sent if number of outstanding tasks for task owner > 0",
          "medium" : "EMAIL",
          "locale" : "en",
          "body" : "Please go to the task manager",
          "name" : "Task Manager Subscription",
          "replyTo" : "$__global.emailFromAddress",
          "header" : "header",
          "modified" : "2020-01-01T00:00:00Z",
          "from" : "$__global.emailFromAddress",
          "id" : "c17bea3a-574d-453c-9e04-4365fbf5af0b",
          "key" : "cloud_manual_work_item_summary"
        }
        "@
        
        # Create notification template
        
        try {
            $Result = ConvertFrom-JsonToTemplateDto -Json $TemplateDto
            New-NotificationTemplateV1 -TemplateDto $Result 
    
