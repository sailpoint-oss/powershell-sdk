- path: /data-segments/v1
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/datasegmentation/methods/data-segmentation#create-data-segment-v1
      source: |
        $DataSegment = @"
        {
          "memberFilter" : {
            "expression" : {
              "children" : [ ],
              "attribute" : "location",
              "value" : {
                "type" : "STRING",
                "value" : "Austin"
              },
              "operator" : "EQUALS"
            }
          },
          "memberSelection" : [ {
            "type" : "IDENTITY",
            "id" : "29cb6c061da843ea8be4b3125f248f2a"
          }, {
            "type" : "IDENTITY",
            "id" : "f7b1b8a35fed4fd4ad2982014e137e19"
          } ],
          "created" : "2020-01-01T00:00:00Z",
          "name" : "segment-xyz",
          "modified" : "2020-01-01T00:00:00Z",
          "description" : "This segment represents xyz",
          "id" : "0f11f2a4-7c94-4bf3-a2bd-742580fe3bde",
          "scopes" : [ {
            "scope" : "ENTITLEMENT",
            "visibility" : "SELECTION",
            "scopeFilter" : null,
            "scopeSelection" : [ {
              "type" : "ENTITLEMENT",
              "id" : "34d73f611449463ea4fdcf02cda0c397"
            } ]
          } ],
          "membership" : "ALL",
          "published" : true,
          "enabled" : true
        }
        "@
        
        # Create segment
        
        try {
            $Result = ConvertFrom-JsonToDataSegment -Json $DataSegment
            New-DataSegmentV1 -DataSegment $Result 
    
            # Below is a request that includes all optional parameters
            # New-DataSegmentV1 -DataSegment $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling New-DataSegmentV1"
            Write-Host $_.ErrorDetails
        }
- path: /data-segments/v1/{segmentId}
  method: DELETE
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/datasegmentation/methods/data-segmentation#delete-data-segment-v1
      source: |
        $SegmentId = "ef38f943-47e9-4562-b5bb-8424a56397d8" # String | The segment ID to delete.
        $XSailPointExperimental = "true" # String | Use this header to enable this experimental API. (default to "true")
        $Published = $false # Boolean | This determines which version of the segment to delete (optional) (default to $false)
        
        # Delete segment by id
        
        try {
            Remove-DataSegmentV1 -SegmentId $SegmentId -XSailPointExperimental $XSailPointExperimental 
    
            # Below is a request that includes all optional parameters
            # Remove-DataSegmentV1 -SegmentId $SegmentId -XSailPointExperimental $XSailPointExperimental -Published $Published   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Remove-DataSegmentV1"
            Write-Host $_.ErrorDetails
        }
