- path: /historical-identities/v1/{id}/compare/{access-type}
  method: GET
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/identityhistory/methods/identity-history#compare-identity-snapshots-access-type-v1
      source: |
        $Id = "8c190e6787aa4ed9a90bd9d5344523fb" # String | The identity id
        $AccessType = "accessProfile" # String | The specific type which needs to be compared
        $XSailPointExperimental = "true" # String | Use this header to enable this experimental API. (default to "true")
        $AccessAssociated = $false # Boolean | Indicates if added or removed access needs to be returned. true - added, false - removed, null - both added & removed (optional)
        $Snapshot1 = "2008-03-01T13:00:00Z" # String | The snapshot 1 of identity (optional)
        $Snapshot2 = "2009-03-01T13:00:00Z" # String | The snapshot 2 of identity (optional)
        $Limit = 250 # Int32 | Max number of results to return. See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to 250)
        $Offset = 0 # Int32 | Offset into the full result set. Usually specified with *limit* to paginate through the results. See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to 0)
        $Count = $true # Boolean | If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.  Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.  See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to $false)
        
        # Gets a list of differences of specific accesstype for the given identity between 2 snapshots
        
        try {
            Compare-IdentitySnapshotsAccessTypeV1 -Id $Id -AccessType $AccessType -XSailPointExperimental $XSailPointExperimental 
    
            # Below is a request that includes all optional parameters
            # Compare-IdentitySnapshotsAccessTypeV1 -Id $Id -AccessType $AccessType -XSailPointExperimental $XSailPointExperimental -AccessAssociated $AccessAssociated -Snapshot1 $Snapshot1 -Snapshot2 $Snapshot2 -Limit $Limit -Offset $Offset -Count $Count   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Compare-IdentitySnapshotsAccessTypeV1"
            Write-Host $_.ErrorDetails
        }
- path: /historical-identities/v1/{id}/compare
  method: GET
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/identityhistory/methods/identity-history#compare-identity-snapshots-v1
      source: |
        $Id = "8c190e6787aa4ed9a90bd9d5344523fb" # String | The identity id
        $XSailPointExperimental = "true" # String | Use this header to enable this experimental API. (default to "true")
        $Snapshot1 = "2007-03-01T13:00:00Z" # String | The snapshot 1 of identity (optional)
        $Snapshot2 = "2008-03-01T13:00:00Z" # String | The snapshot 2 of identity (optional)
        $AccessItemTypes = "MyAccessItemTypes" # String[] | An optional list of access item types (app, account, entitlement, etc...) to return.   If null or empty, all access items types are returned  (optional)
        
        
        $Limit = 250 # Int32 | Max number of results to return. See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to 250)
        $Offset = 0 # Int32 | Offset into the full result set. Usually specified with *limit* to paginate through the results. See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to 0)
        $Count = $true # Boolean | If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.  Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.  See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to $false)
        
        # Gets a difference of count for each access item types for the given identity between 2 snapshots
        
        try {
            Compare-IdentitySnapshotsV1 -Id $Id -XSailPointExperimental $XSailPointExperimental 
    
            # Below is a request that includes all optional parameters
