- path: /access-model-metadata/v1/attributes
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/accessmodelmetadata/methods/access-model-metadata#create-access-model-metadata-attribute-v1
      source: |
        $AttributeDTO = @"
        {
          "multiselect" : false,
          "values" : [ {
            "name" : "Public",
            "value" : "public",
            "status" : "active"
          }, {
            "name" : "Public",
            "value" : "public",
            "status" : "active"
          } ],
          "name" : "Privacy",
          "description" : "Specifies the level of privacy associated with an access item.",
          "type" : "governance",
          "objectTypes" : [ "entitlement" ],
          "key" : "iscPrivacy",
          "status" : "active"
        }
        "@
        
        # Create access model metadata attribute
        
        try {
            $Result = ConvertFrom-JsonToAttributeDTO -Json $AttributeDTO
            New-AccessModelMetadataAttributeV1 -AttributeDTO $Result 
    
            # Below is a request that includes all optional parameters
            # New-AccessModelMetadataAttributeV1 -AttributeDTO $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling New-AccessModelMetadataAttributeV1"
            Write-Host $_.ErrorDetails
        }
