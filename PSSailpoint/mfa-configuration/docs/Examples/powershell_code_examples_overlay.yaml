- path: /mfa/v1/duo-web/config
  method: PUT
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/mfaconfiguration/methods/mfa-configuration#set-mfa-duo-config-v1
      source: |
        $Mfaduoconfig = @"
        {"mfaMethod":"duo-web","enabled":true,"host":"www.example.com","accessKey":"qw123Y3QlA5UqocYpdU3rEkzrK2D497y","identityAttribute":"email","configProperties":{"skey":"12q3WERlcUHWJmiMqyCXI3uOF7EaDJTbdeOp6E2B","ikey":"Q123WE45R6TY7890ZXCV"}}
        "@
        
        # Set duo mfa configuration
        
        try {
            $Result = ConvertFrom-JsonToMfaduoconfig -Json $Mfaduoconfig
            Set-MFADuoConfigV1 -Mfaduoconfig $Result 
    
            # Below is a request that includes all optional parameters
            # Set-MFADuoConfigV1 -Mfaduoconfig $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Set-MFADuoConfigV1"
            Write-Host $_.ErrorDetails
        }
