- path: /org-config/v1/valid-time-zones
  method: GET
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/orgconfigv1/methods/org-config#get-valid-time-zones-v1
      source: |
        $XSailPointExperimental = "true" # String | Use this header to enable this experimental API. (default to "true")
        $Limit = 50 # Int32 | Note that for this API the maximum value for limit is 50. See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to 50)
        $Offset = 0 # Int32 | Offset into the full result set. Usually specified with *limit* to paginate through the results. See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to 0)
        $Count = $true # Boolean | If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.  Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.  See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to $false)
        
        # Get valid time zones
        
        try {
            Get-ValidTimeZonesV1 -XSailPointExperimental $XSailPointExperimental 
    
            # Below is a request that includes all optional parameters
            # Get-ValidTimeZonesV1 -XSailPointExperimental $XSailPointExperimental -Limit $Limit -Offset $Offset -Count $Count   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Get-ValidTimeZonesV1"
            Write-Host $_.ErrorDetails
        }
- path: /org-config/v1
  method: PATCH
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/orgconfigv1/methods/org-config#patch-org-config-v1
      source: |
        $JsonpatchoperationValue = Initialize-JsonpatchoperationValue 
$Jsonpatchoperation = Initialize-Jsonpatchoperation -Op "add" -Path "/description" -Value $JsonpatchoperationValue# Jsonpatchoperation[] | A list of schema attribute update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard.
        $Jsonpatchoperation = @"[{"op":"replace","path":"/timeZone","value":"America/Toronto"}]"@ 
        
        
        # Patch org config
        
        try {
            $Result = ConvertFrom-JsonToJsonpatchoperation -Json $Jsonpatchoperation
            Update-OrgConfigV1 -Jsonpatchoperation $Result 
    
            # Below is a request that includes all optional parameters
            # Update-OrgConfigV1 -Jsonpatchoperation $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Update-OrgConfigV1"
            Write-Host $_.ErrorDetails
        }
