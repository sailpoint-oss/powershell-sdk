- path: /sources/v1/{sourceId}/classify
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/classifysource/methods/classify-source#send-classify-machine-account-from-source-v1
      source: |
        $SourceId = "ef38f94347e94562b5bb8424a56397d8" # String | Source ID.
        
        # Classify source's all accounts
        
        try {
            Send-ClassifyMachineAccountFromSourceV1 -SourceId $SourceId 
    
