- path: /accounts/v1/search-attribute-config
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/searchattributeconfigurationv1/methods/search-attribute-configuration#create-search-attribute-config-v1
      source: |
        $XSailPointExperimental = "true" # String | Use this header to enable this experimental API. (default to "true")
        $Searchattributeconfig = @"
        {"name":"newMailAttribute","displayName":"New Mail Attribute","applicationAttributes":{"2c9180866166b5b0016167c32ef31a66":"mail","2c9180866166b5b0016167c32ef31a67":"mail"}}
        "@
        
        # Create extended search attributes
        
        try {
            $Result = ConvertFrom-JsonToSearchattributeconfig -Json $Searchattributeconfig
            New-SearchAttributeConfigV1 -XSailPointExperimental $XSailPointExperimental -Searchattributeconfig $Result 
    
            # Below is a request that includes all optional parameters
            # New-SearchAttributeConfigV1 -XSailPointExperimental $XSailPointExperimental -Searchattributeconfig $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling New-SearchAttributeConfigV1"
            Write-Host $_.ErrorDetails
        }
