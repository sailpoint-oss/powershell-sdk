- path: /ssf/v1/streams
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/sharedsignalsframeworkssfv1/methods/shared-signals-framework-ssf#create-stream-v1
      source: |
        $Createstreamrequest = @"
        {"delivery":{"method":"urn:ietf:rfc:8935","endpoint_url":"https://receiver.example.com/ssf/events"},"events_requested":["https://schemas.openid.net/secevent/caep/event-type/session-revoked"],"description":"Production event stream for session revocation notifications"}
        "@
        
        # Create stream
        
        try {
            $Result = ConvertFrom-JsonToCreatestreamrequest -Json $Createstreamrequest
            New-StreamV1 -Createstreamrequest $Result 
    
            # Below is a request that includes all optional parameters
            # New-StreamV1 -Createstreamrequest $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling New-StreamV1"
            Write-Host $_.ErrorDetails
        }
