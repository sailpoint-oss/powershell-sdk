- path: /launchers/v1
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/launchers/methods/launchers#create-launcher-v1
      source: |
        $LauncherRequest = @"
        {
          "reference" : {
            "id" : "2fd6ff94-2081-4d29-acbc-83a0a2f744a5",
            "type" : "WORKFLOW"
          },
          "name" : "Group Create",
          "description" : "Create a new Active Directory Group",
          "disabled" : false,
          "type" : "INTERACTIVE_PROCESS",
          "config" : "{\"workflowId\" : \"6b42d9be-61b6-46af-827e-ea29ba8aa3d9\"}"
        }
        "@
        
        # Create launcher
        
        try {
            $Result = ConvertFrom-JsonToLauncherRequest -Json $LauncherRequest
            New-LauncherV1 -LauncherRequest $Result 
    
            # Below is a request that includes all optional parameters
            # New-LauncherV1 -LauncherRequest $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling New-LauncherV1"
            Write-Host $_.ErrorDetails
        }
