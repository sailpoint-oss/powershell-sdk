- path: /password-org-config/v1
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/passwordconfiguration/methods/password-configuration#create-password-org-config-v1
      source: |
        $Passwordorgconfig = @"
        {"customInstructionsEnabled":true,"digitTokenEnabled":true,"digitTokenDurationMinutes":12,"digitTokenLength":9}
        "@
        
        # Create password org config
        
        try {
            $Result = ConvertFrom-JsonToPasswordorgconfig -Json $Passwordorgconfig
            New-PasswordOrgConfigV1 -Passwordorgconfig $Result 
    
            # Below is a request that includes all optional parameters
            # New-PasswordOrgConfigV1 -Passwordorgconfig $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling New-PasswordOrgConfigV1"
            Write-Host $_.ErrorDetails
        }
