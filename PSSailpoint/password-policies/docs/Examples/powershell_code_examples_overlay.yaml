- path: /password-policies/v1
  method: GET
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/passwordpolicies/methods/password-policies#list-password-policies-v1
      source: |
        $XSailPointExperimental = "true" # String | Use this header to enable this experimental API. (default to "true")
        $Limit = 250 # Int32 | Max number of results to return. See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to 250)
        $Offset = 0 # Int32 | Offset into the full result set. Usually specified with *limit* to paginate through the results. See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to 0)
        $Count = $true # Boolean | If *true* it will populate the *X-Total-Count* response header with the number of results that would be returned if *limit* and *offset* were ignored.  Since requesting a total count can have a performance impact, it is recommended not to send **count=true** if that value will not be used.  See [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters) for more information. (optional) (default to $false)
        
        # List password policies
        
        try {
            Get-PasswordPoliciesV1 -XSailPointExperimental $XSailPointExperimental 
    
            # Below is a request that includes all optional parameters
            # Get-PasswordPoliciesV1 -XSailPointExperimental $XSailPointExperimental -Limit $Limit -Offset $Offset -Count $Count   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Get-PasswordPoliciesV1"
            Write-Host $_.ErrorDetails
        }
- path: /password-policies/v1/{id}
  method: PUT
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/passwordpolicies/methods/password-policies#set-password-policy-v1
      source: |
        $Id = "ff808081838d9e9d01838da6a03e0007" # String | The ID of password policy to update.
        $XSailPointExperimental = "true" # String | Use this header to enable this experimental API. (default to "true")
        $Passwordpolicyv3dto = @"
        {"description":"Password Policy after update.","id":"2c91808e7d976f3b017d9f5ceae440c8","name":"Improved Password Policy","dateCreated":1639056206564,"lastUpdated":1662385430753,"firstExpirationReminder":90,"accountIdMinWordLength":3,"accountNameMinWordLength":3,"maxLength":0,"maxRepeatedChars":4,"minAlpha":1,"minCharacterTypes":-1,"minLength":8,"minLower":0,"minNumeric":1,"minSpecial":0,"minUpper":0,"passwordExpiration":90,"defaultPolicy":false,"enablePasswdExpiration":false,"requireStrongAuthn":false,"requireStrongAuthOffNetwork":false,"requireStrongAuthUntrustedGeographies":false,"useAccountAttributes":false,"useDictionary":false,"useIdentityAttributes":false,"validateAgainstAccountId":true,"validateAgainstAccountName":true,"sourceIds":["2c91808382ffee0b01830de154f14034","2c91808582ffee0c01830de36511405f"]}
        "@
        
        # Update password policy by id
        
        try {
            $Result = ConvertFrom-JsonToPasswordpolicyv3dto -Json $Passwordpolicyv3dto
            Set-PasswordPolicyV1 -Id $Id -XSailPointExperimental $XSailPointExperimental -Passwordpolicyv3dto $Result 
    
            # Below is a request that includes all optional parameters
            # Set-PasswordPolicyV1 -Id $Id -XSailPointExperimental $XSailPointExperimental -Passwordpolicyv3dto $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Set-PasswordPolicyV1"
            Write-Host $_.ErrorDetails
        }
