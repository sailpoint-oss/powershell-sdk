- path: /query-password-info/v1
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/passwordmanagement/methods/password-management#query-password-info-v1
      source: |
        $PasswordInfoQueryDTO = @"
        {
          "sourceName" : "My-AD",
          "userName" : "Abby.Smith"
        }
        "@
        
        # Query password info
        
        try {
            $Result = ConvertFrom-JsonToPasswordInfoQueryDTO -Json $PasswordInfoQueryDTO
            Search-PasswordInfoV1 -PasswordInfoQueryDTO $Result 
    
            # Below is a request that includes all optional parameters
