- path: /connectors/v1/{scriptName}
  method: PATCH
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/connectorsv1/methods/connectors#update-connector-v1
      source: |
        $ScriptName = "aScriptName" # String | The scriptName value of the connector. ScriptName is the unique id generated at connector creation.
        $JsonpatchoperationValue = Initialize-JsonpatchoperationValue 
$Jsonpatchoperation = Initialize-Jsonpatchoperation -Op "add" -Path "/description" -Value $JsonpatchoperationValue# Jsonpatchoperation[] | A list of connector detail update operations 
        $Jsonpatchoperation = @""@ 
        
        
        # Update connector by script name
        
        try {
            $Result = ConvertFrom-JsonToJsonpatchoperation -Json $Jsonpatchoperation
            Update-ConnectorV1 -ScriptName $ScriptName -Jsonpatchoperation $Result 
    
            # Below is a request that includes all optional parameters
            # Update-ConnectorV1 -ScriptName $ScriptName -Jsonpatchoperation $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Update-ConnectorV1"
            Write-Host $_.ErrorDetails
        }
