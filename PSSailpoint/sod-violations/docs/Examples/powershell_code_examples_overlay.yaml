- path: /sod-violations/v1/predict
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/sodviolationsv1/methods/sod-violations#start-predict-sod-violations-v1
      source: |
        $Identitywithnewaccess = @"
        {"identityId":"2c91808568c529c60168cca6f90c1313","accessRefs":[{"type":"ENTITLEMENT","id":"2c918087682f9a86016839c050861ab1"},{"type":"ENTITLEMENT","id":"2c918087682f9a86016839c0509c1ab2"}]}
        "@
        
        # Predict sod violations for identity.
        
        try {
            $Result = ConvertFrom-JsonToIdentitywithnewaccess -Json $Identitywithnewaccess
            Start-PredictSodViolationsV1 -Identitywithnewaccess $Result 
    
            # Below is a request that includes all optional parameters
            # Start-PredictSodViolationsV1 -Identitywithnewaccess $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Start-PredictSodViolationsV1"
            Write-Host $_.ErrorDetails
        }
- path: /sod-violations/v1/check
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/sodviolationsv1/methods/sod-violations#start-violation-check-v1
      source: |
        $Identitywithnewaccess = @"
        {"identityId":"2c91808568c529c60168cca6f90c1313","accessRefs":[{"type":"ENTITLEMENT","id":"2c918087682f9a86016839c050861ab1"},{"type":"ENTITLEMENT","id":"2c918087682f9a86016839c0509c1ab2"}],"clientMetadata":{"additionalProp1":"string","additionalProp2":"string","additionalProp3":"string"}}
        "@
        
        # Check sod violations
        
        try {
            $Result = ConvertFrom-JsonToIdentitywithnewaccess -Json $Identitywithnewaccess
            Start-ViolationCheckV1 -Identitywithnewaccess $Result 
    
            # Below is a request that includes all optional parameters
            # Start-ViolationCheckV1 -Identitywithnewaccess $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Start-ViolationCheckV1"
            Write-Host $_.ErrorDetails
        }
