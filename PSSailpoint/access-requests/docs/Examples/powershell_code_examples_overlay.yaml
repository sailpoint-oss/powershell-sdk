- path: /access-request-approvals/v1/bulk-approve
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/accessrequests/methods/access-requests#approve-bulk-access-request-v1
      source: |
        $Bulkapproveaccessrequest = @"
        {"accessRequestIds":["2c91808568c529c60168cca6f90c1313","2c91808568c529c60168cca6f90c1314"],"comment":"I approve these request items"}
        "@
        
        # Bulk approve access request
        
        try {
            $Result = ConvertFrom-JsonToBulkapproveaccessrequest -Json $Bulkapproveaccessrequest
            Approve-BulkAccessRequestV1 -Bulkapproveaccessrequest $Result 
    
            # Below is a request that includes all optional parameters
            # Approve-BulkAccessRequestV1 -Bulkapproveaccessrequest $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling Approve-BulkAccessRequestV1"
            Write-Host $_.ErrorDetails
        }
