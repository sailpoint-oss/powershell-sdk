- path: /source-subtypes/v1
  method: POST
  xCodeSample:
    - lang: PowerShell
      label: SDK_tools/sdk/powershell/machineaccountsubtypes/methods/machine-account-subtypes#create-source-subtype-v1
      source: |
        $XSailPointExperimental = "true" # String | Use this header to enable this experimental API. (default to "true")
        $CreateSourceSubtypeV1Request = @"
        {"sourceId":"6d0458373bec4b4b80460992b76016da","technicalName":"foo","displayName":"Mr Foo","description":"fighters","type":"MACHINE"}
        "@
        
        # Create subtype
        
        try {
            $Result = ConvertFrom-JsonToCreateSourceSubtypeV1Request -Json $CreateSourceSubtypeV1Request
            New-SourceSubtypeV1 -XSailPointExperimental $XSailPointExperimental -CreateSourceSubtypeV1Request $Result 
    
            # Below is a request that includes all optional parameters
            # New-SourceSubtypeV1 -XSailPointExperimental $XSailPointExperimental -CreateSourceSubtypeV1Request $Result   
        } catch {
            Write-Host $_.Exception.Response.StatusCode.value__ "Exception occurred when calling New-SourceSubtypeV1"
            Write-Host $_.ErrorDetails
        }
